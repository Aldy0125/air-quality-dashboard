<!DOCTYPE html>
<html>
<head>
  <title>Air Quality Dashboard Medan</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="title">

      <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/414/414927.png" />
        <span>AirSense</span>
      </div>

      <h1>AIR QUALITY <span>DASHBOARD</span></h1>
      <p class="subtitle">Pantau kualitas udara secara real-time di Kota Medan</p>
    </div>

    <div class="info">
      <div>📍 Medan, Sumatera Utara</div>
      <div>📅 7 Hari Terakhir</div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="summary">

    <div class="box">
      <h3>Rata-rata AQI</h3>

      <div class="box-header">
        <h2 id="avg"></h2>
        <span class="badge"></span>
      </div>

      <p class="desc">Rata-rata 7 hari terakhir</p>
    </div>

    <div class="box">
      <h3>AQI Tertinggi</h3>

      <div class="box-header">
        <h2 id="max"></h2>
        <span class="badge"></span>
      </div>

      <p class="desc">Nilai tertinggi 7 hari</p>
    </div>

  </div>

  <!-- CONTENT -->
  <div class="grid">
    
    <div class="card">
      <h3>Data Harian</h3>
      <div id="data"></div>
    </div>

    <div class="card">
      <h3>Grafik Tren AQI</h3>
      <canvas id="chart"></canvas>
    </div>

  </div>

</div>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 AirSense Dashboard | Developed by Aldy Putra</p>
</footer>

<script src="app.js"></script>

</body>
</html>
